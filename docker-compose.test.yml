services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lkh
      POSTGRES_PASSWORD: lkh
      POSTGRES_DB: lkh_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lkh -d lkh_test"]
      interval: 2s
      timeout: 3s
      retries: 20
