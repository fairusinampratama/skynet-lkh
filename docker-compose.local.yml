services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lkh
      POSTGRES_PASSWORD: lkh
      POSTGRES_DB: lkh
    ports:
      - "55433:5432"
    volumes:
      - lkh_local_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lkh -d lkh"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  lkh_local_postgres:
