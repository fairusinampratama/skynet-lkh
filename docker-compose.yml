version: '3.8'

services:
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5173:5173"
      - "3000:3000"
      - "24678:24678"
    environment:
      - DATABASE_URL=postgresql://lkh:lkh@postgres:5432/lkh
      - NODE_ENV=development
      - PORT=5173
      - HOST=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npm install && 
             npm run db:generate && 
             npx prisma migrate deploy && 
             npm run seed:auth &&
             npm run seed:lkh:periods &&
             npm run dev"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lkh
      POSTGRES_PASSWORD: lkh
      POSTGRES_DB: lkh
    ports:
      - "55433:5432"
    volumes:
      - lkh_local_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lkh -d lkh"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  lkh_local_postgres:
